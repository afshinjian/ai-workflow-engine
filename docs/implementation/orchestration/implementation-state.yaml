_status_payload/_contract_v2_for_agent_run_payload helpers in cli.py, while the exact pre-existing v1 code path is untouched and byte-identical (proved by a dedicated v1-byte-compatibility test per command family); (B) _protected and _config now accept output/command and, under contract v2 + --output json, emit exactly one stable error envelope (ok=false, data=null, error.code=type(exc).__name__, error.message=str(exc), error.retryable=false, error.details={}) on stdout instead of stderr-only, with v1 behavior (stderr, exit 2, zero stdout) byte-for-byte unchanged; the one deliberate exception (an unresolvable --contract-version itself) still always uses the v1/stderr shape because no contract has been selected yet to envelope the error in, which is now explicitly commented and tested (test_nonsense_contract_version_still_uses_stderr_not_v2_envelope); (C) ContractEnvelopeV2 gained a model_validator(mode="after") enforcing ok=true requires data is not None and error is None, and ok=false requires data is None and error is not None, verified both via direct construction and via CLI_CONTRACT_REGISTRY.dispatch (schema/contract.py). 28 new tests were added (inspect/prompt/state/agent-run v2 success and v1-byte-compatibility, protected/configuration/prompt/agent-run v2 error envelopes, a commit writable-gate refusal in v2 that performs no write, single-JSON-document/FORCE_COLOR purity across five command families, and Finding C''s envelope consistency positive/negative cases). Focused suite 102 -> 130 passed; full pytest -q 796 -> 824 passed, 0 skipped; ruff/black/mypy clean; state validator and workflowctl verify PASS; git diff --check clean. Only stages/ORCH-002.md''s allowed paths changed (src/ai_workflow_engine/schema/, reporting/, cli.py, exceptions.py, tests/test_schema_registry.py, tests/test_cli_contract_v2.py, and this ORCH-002 state/evidence/handoff); the original evidence/ORCH-002/20260721T152237Z-...-e916ac25.yaml and its handoff are untouched.'}]}

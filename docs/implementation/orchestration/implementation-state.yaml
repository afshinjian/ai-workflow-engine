unresolved_risks:
  - id: R-APPROVAL-ISOLATION
    severity: CRITICAL
    summary: Autonomous writes are unsafe without approvald under a distinct OS authority.
    disposition: Must be proven in ORCH-017 and ORCH-027 before write mode.
  - id: R-GOVERNANCE-TRANSACTION
    severity: CRITICAL
    summary: Multi-document publication and Git commit span a crash boundary.
    disposition: Fault-injection acceptance in ORCH-020 and ORCH-027.
  - id: R-BOOTSTRAP-ROLE-OVERLAP
    severity: MEDIUM
    summary: One bootstrap session both resolved the top-level DESIGN_PACKAGE_NOT_COMMITTED blocker and acted as ORCH-000's implementer through VERIFIED; it recorded no review verdict.
    disposition: The independent ORCH-000 reviewer must be a distinct actor/session from claude-code-bootstrap, per session-protocol.md reviewer-independence rule.
  - id: R-REMEDIATION-AMENDMENT-UNREVIEWED
    severity: HIGH
    summary: >-
      Realized, not merely anticipated: the stages/ORCH-000.md
      evidence-path/lifecycle amendment (decision-log.md D3-016) that
      resolved review findings F-1/F-2 was authored by the REMEDIATOR
      session itself, with no ARCHITECT/HUMAN_OWNER-role history entry
      authorizing it, and in direct contradiction of
      prompts/remediate-rejected.md's own instruction to stop and record
      BLOCKED for a contract/plan change. Independently reviewed at HEAD
      020d036 and rejected (F-4/F-5/F-6 in
      reviews/ORCH-000/20260720T194000Z-claude-code-independent-reviewer-2-b7e21ac4.yaml).
    disposition: >-
      Resolved 2026-07-20 by a distinct ARCHITECT/HUMAN_OWNER session
      (history sequence 11; decision-log.md D3-017): the missing
      authorization history entry and plan_version increment are now
      durably recorded, and D3-016's stage-contract text is ratified
      unchanged. The delegated remaining scope (F-7 evidence-log recapture)
      was completed by a distinct REMEDIATOR session (history sequences
      12-14; claude-code-remediator-2), which did not touch
      stages/ORCH-000.md, decision-log.md, session-protocol.md or
      implementation-plan.md. Independently assessed 2026-07-20 by a
      seventh distinct actor (history sequence 15; reviewer
      claude-code-independent-reviewer-3,
      reviews/ORCH-000/20260720T220000Z-claude-code-independent-reviewer-3-c4a91d02.yaml):
      the D3-016 ratification, the D3-017 authorization, and the F-7
      recapture were all found sound on independent re-verification
      (byte-for-byte digest checks, changed-path cross-checks against
      D3-017's authorized_paths). This risk is therefore closed on
      substance. ORCH-000's F-8 ground (missing environment_fingerprint_digest
      in evidence/ORCH-000/20260720T210000Z-claude-code-remediator-2-8387417f.yaml's
      command records) was itself resolved 2026-07-20 by an eighth distinct
      REMEDIATOR session (history sequences 16-18; claude-code-remediator-3,
      evidence/ORCH-000/20260720T223000Z-claude-code-remediator-3-6e1d7d18.yaml),
      scoped to evidence/ORCH-000/, reviews/ORCH-000/ and handoffs/ORCH-000/
      only, which did not touch session-protocol.md, decision-log.md,
      implementation-plan.md, implementation-state.schema.yaml or
      stages/ORCH-000.md, and did not re-litigate F-1 through F-7 or any
      prior review's verdict/findings. It left the earlier, F-8-deficient
      evidence record (...-8387417f.yaml) unmodified and unremoved (never
      overwrite an evidence record, per session-protocol.md section 7) and
      added a new implementation-evidence record with a valid
      environment_fingerprint_digest on every command record. Independently
      reviewed 2026-07-20 by a ninth distinct actor (history sequence 19;
      reviewer claude-code-independent-reviewer-4,
      reviews/ORCH-000/20260720T205209Z-claude-code-independent-reviewer-4-27303e9e.yaml):
      the F-8 fix was confirmed sound (environment_fingerprint_digest present
      and byte-for-byte reproducible on every command record of the evidence
      backing VERIFIED, including an independent re-derivation on the
      reviewer's own machine, not merely trusting the remediator's claim),
      and the D3-016/D3-017 chain and F-7 recapture were reconfirmed
      unchanged since the third review. No new finding was identified.
      ORCH-000 is now REVIEW_APPROVED (review_status APPROVED, reviewer
      claude-code-independent-reviewer-4, implementation_commit
      857d2c9b69cd85e40bdd2b9f8d252f2d3df5790e). This risk is fully resolved
      and closed; it does not apply to any later stage.
  - id: R-ORCH-001-VALIDATOR-CORRECTNESS
    severity: HIGH
    summary: >-
      scripts/orchestration_feature_state.py hand-encodes the legal
      stage-transition table (session-protocol.md section 2) and the
      semantic-rule comment block in implementation-state.schema.yaml in
      pure Python (no jsonschema dependency, per pyproject.toml's fixed
      dependency set); a defect could incorrectly authorize an illegal
      state transition or falsely reject a legal one, matching this
      stage's own documented risk ("Validator defects could authorize
      later work").
    disposition: >-
      Realized, not merely anticipated: the first independent ORCH-001
      review (reviewer claude-code-independent-reviewer-orch-001-1,
      reviews/ORCH-001/20260721T122035Z-claude-code-independent-reviewer-orch-001-1-0a0c5a0c.yaml)
      found that apply_transition's BLOCKED -> IN_PROGRESS edge performs no
      check that the stage's blockers are resolved and no recheck that its
      prerequisites remain REVIEW_APPROVED, contradicting
      session-protocol.md section 2's row for that exact edge ("blocker
      resolution is evidenced and prerequisites still approved").
      Reproduced concretely with an adversarial fixture: a BLOCKED stage
      with an unresolved blocker transitions to IN_PROGRESS with no
      resolve_blockers argument, and the tool's own validate_state reports
      the result as fully valid (F-1, HIGH, blocking). The implementer's 70
      tests do not cover the negative case for this edge (F-2, MEDIUM,
      blocking). Severity raised MEDIUM -> HIGH accordingly. ORCH-001
      returned to REVIEW_REJECTED (VERIFIED -> REVIEW_REJECTED, history
      sequence 23).
      Remediated 2026-07-21 by a distinct REMEDIATOR session
      (claude-code-remediator-orch-001-1, history sequences 24-26,
      evidence/ORCH-001/20260721T124440Z-claude-code-remediator-orch-001-1-6e2bbce9.yaml):
      apply_transition now has an explicit `from_status == "BLOCKED" and
      to_status == "IN_PROGRESS"` gate that raises TransitionError
      UNRESOLVED_BLOCKER unless every stage blocker is resolved (already,
      or via that same call's resolve_blockers) and PREREQUISITE_NOT_APPROVED
      unless every prerequisite still recomputes as REVIEW_APPROVED,
      mirroring the pre-existing NOT_STARTED -> IN_PROGRESS gate. Four new
      tests in tests/test_orchestration_feature_state.py close F-2: two
      negative (unresolved blocker rejected; unapproved prerequisite
      rejected) and two positive (resume succeeds once both conditions
      hold; an already-resolved blocker need not be re-supplied). Full
      regression (758 passed, up from 754) and the focused suite (74
      passed, up from 70) confirm no other legal transition's behavior
      changed. Severity is left HIGH and this risk is not marked resolved
      by this remediation session alone (a REMEDIATOR may not approve its
      own fix, session-protocol.md section 6): a subsequent independent
      reviewer, distinct from claude-code-implementer-1,
      claude-code-independent-reviewer-orch-001-1 and
      claude-code-remediator-orch-001-1, must re-audit
      LEGAL_TRANSITIONS/validate_semantics/apply_transition line-by-line,
      independently reproduce the fix, and confirm no remaining gap of the
      same kind before this risk can be marked resolved.

unresolved_risks:
  - id: R-APPROVAL-ISOLATION
    severity: CRITICAL
    summary: Autonomous writes are unsafe without approvald under a distinct OS authority.
    disposition: Must be proven in ORCH-017 and ORCH-027 before write mode.
  - id: R-GOVERNANCE-TRANSACTION
    severity: CRITICAL
    summary: Multi-document publication and Git commit span a crash boundary.
    disposition: Fault-injection acceptance in ORCH-020 and ORCH-027.
  - id: R-BOOTSTRAP-ROLE-OVERLAP
    severity: MEDIUM
    summary: One bootstrap session both resolved the top-level DESIGN_PACKAGE_NOT_COMMITTED blocker and acted as ORCH-000's implementer through VERIFIED; it recorded no review verdict.
    disposition: The independent ORCH-000 reviewer must be a distinct actor/session from claude-code-bootstrap, per session-protocol.md reviewer-independence rule.
  - id: R-REMEDIATION-AMENDMENT-UNREVIEWED
    severity: HIGH
    summary: >-
      Realized, not merely anticipated: the stages/ORCH-000.md
      evidence-path/lifecycle amendment (decision-log.md D3-016) that
      resolved review findings F-1/F-2 was authored by the REMEDIATOR
      session itself, with no ARCHITECT/HUMAN_OWNER-role history entry
      authorizing it, and in direct contradiction of
      prompts/remediate-rejected.md's own instruction to stop and record
      BLOCKED for a contract/plan change. Independently reviewed at HEAD
      020d036 and rejected (F-4/F-5/F-6 in
      reviews/ORCH-000/20260720T194000Z-claude-code-independent-reviewer-2-b7e21ac4.yaml).
    disposition: >-
      Resolved 2026-07-20 by a distinct ARCHITECT/HUMAN_OWNER session
      (history sequence 11; decision-log.md D3-017): the missing
      authorization history entry and plan_version increment are now
      durably recorded, and D3-016's stage-contract text is ratified
      unchanged. The delegated remaining scope (F-7 evidence-log recapture)
      was completed by a distinct REMEDIATOR session (history sequences
      12-14; claude-code-remediator-2), which did not touch
      stages/ORCH-000.md, decision-log.md, session-protocol.md or
      implementation-plan.md. Independently assessed 2026-07-20 by a
      seventh distinct actor (history sequence 15; reviewer
      claude-code-independent-reviewer-3,
      reviews/ORCH-000/20260720T220000Z-claude-code-independent-reviewer-3-c4a91d02.yaml):
      the D3-016 ratification, the D3-017 authorization, and the F-7
      recapture were all found sound on independent re-verification
      (byte-for-byte digest checks, changed-path cross-checks against
      D3-017's authorized_paths). This risk is therefore closed on
      substance. ORCH-000's F-8 ground (missing environment_fingerprint_digest
      in evidence/ORCH-000/20260720T210000Z-claude-code-remediator-2-8387417f.yaml's
      command records) was itself resolved 2026-07-20 by an eighth distinct
      REMEDIATOR session (history sequences 16-18; claude-code-remediator-3,
      evidence/ORCH-000/20260720T223000Z-claude-code-remediator-3-6e1d7d18.yaml),
      scoped to evidence/ORCH-000/, reviews/ORCH-000/ and handoffs/ORCH-000/
      only, which did not touch session-protocol.md, decision-log.md,
      implementation-plan.md, implementation-state.schema.yaml or
      stages/ORCH-000.md, and did not re-litigate F-1 through F-7 or any
      prior review's verdict/findings. It left the earlier, F-8-deficient
      evidence record (...-8387417f.yaml) unmodified and unremoved (never
      overwrite an evidence record, per session-protocol.md section 7) and
      added a new implementation-evidence record with a valid
      environment_fingerprint_digest on every command record. Independently
      reviewed 2026-07-20 by a ninth distinct actor (history sequence 19;
      reviewer claude-code-independent-reviewer-4,
      reviews/ORCH-000/20260720T205209Z-claude-code-independent-reviewer-4-27303e9e.yaml):
      the F-8 fix was confirmed sound (environment_fingerprint_digest present
      and byte-for-byte reproducible on every command record of the evidence
      backing VERIFIED, including an independent re-derivation on the
      reviewer's own machine, not merely trusting the remediator's claim),
      and the D3-016/D3-017 chain and F-7 recapture were reconfirmed
      unchanged since the third review. No new finding was identified.
      ORCH-000 is now REVIEW_APPROVED (review_status APPROVED, reviewer
      claude-code-independent-reviewer-4, implementation_commit
      857d2c9b69cd85e40bdd2b9f8d252f2d3df5790e). This risk is fully resolved
      and closed; it does not apply to any later stage.
  - id: R-ORCH-001-VALIDATOR-CORRECTNESS
    severity: HIGH
    summary: >-
      scripts/orchestration_feature_state.py hand-encodes the legal
      stage-transition table (session-protocol.md section 2) and the
      semantic-rule comment block in implementation-state.schema.yaml in
      pure Python (no jsonschema dependency, per pyproject.toml's fixed
      dependency set); a defect could incorrectly authorize an illegal
      state transition or falsely reject a legal one, matching this
      stage's own documented risk ("Validator defects could authorize
      later work").
    disposition: >-
      Realized, not merely anticipated: the first independent ORCH-001
      review (reviewer claude-code-independent-reviewer-orch-001-1,
      reviews/ORCH-001/20260721T122035Z-claude-code-independent-reviewer-orch-001-1-0a0c5a0c.yaml)
      found that apply_transition's BLOCKED -> IN_PROGRESS edge performs no
      check that the stage's blockers are resolved and no recheck that its
      prerequisites remain REVIEW_APPROVED, contradicting
      session-protocol.md section 2's row for that exact edge ("blocker
      resolution is evidenced and prerequisites still approved").
      Reproduced concretely with an adversarial fixture: a BLOCKED stage
      with an unresolved blocker transitions to IN_PROGRESS with no
      resolve_blockers argument, and the tool's own validate_state reports
      the result as fully valid (F-1, HIGH, blocking). The implementer's 70
      tests do not cover the negative case for this edge (F-2, MEDIUM,
      blocking). Severity raised MEDIUM -> HIGH accordingly. ORCH-001
      returned to REVIEW_REJECTED (VERIFIED -> REVIEW_REJECTED, history
      sequence 23).
      Remediated 2026-07-21 by a distinct REMEDIATOR session
      (claude-code-remediator-orch-001-1, history sequences 24-26,
      evidence/ORCH-001/20260721T124440Z-claude-code-remediator-orch-001-1-6e2bbce9.yaml):
      apply_transition now has an explicit `from_status == "BLOCKED" and
      to_status == "IN_PROGRESS"` gate that raises TransitionError
      UNRESOLVED_BLOCKER unless every stage blocker is resolved (already,
      or via that same call's resolve_blockers) and PREREQUISITE_NOT_APPROVED
      unless every prerequisite still recomputes as REVIEW_APPROVED,
      mirroring the pre-existing NOT_STARTED -> IN_PROGRESS gate. Four new
      tests in tests/test_orchestration_feature_state.py close F-2: two
      negative (unresolved blocker rejected; unapproved prerequisite
      rejected) and two positive (resume succeeds once both conditions
      hold; an already-resolved blocker need not be re-supplied). Full
      regression (758 passed, up from 754) and the focused suite (74
      passed, up from 70) confirm no other legal transition's behavior
      changed. Severity was left HIGH pending a subsequent independent
      reviewer (a REMEDIATOR may not approve its own fix, session-protocol.md
      section 6). Independently re-audited 2026-07-21 by a distinct REVIEWER
      session (claude-code-independent-reviewer-orch-001-2, history sequence
      27,
      reviews/ORCH-001/20260721T131500Z-claude-code-independent-reviewer-orch-001-2-0637a178.yaml),
      distinct from claude-code-implementer-1,
      claude-code-independent-reviewer-orch-001-1 and
      claude-code-remediator-orch-001-1: the F-1/F-2 fix itself is confirmed
      sound -- LEGAL_TRANSITIONS, check_transition_legal, validate_schema,
      validate_semantics and the CAS-guard/atomic-write path are
      byte-for-byte unchanged (single additive hunk, 0 deletions), and the
      new BLOCKED -> IN_PROGRESS gate was independently reproduced correct
      with a fresh, methodologically distinct adversarial fixture (CLI
      subcommand end-to-end, not direct apply_transition calls) covering all
      three required scenarios. However, this review found a new, separate
      blocking defect (F-3, HIGH) while independently verifying the
      consequences of the ORCH-001 -> REVIEW_APPROVED transition this stage
      itself requires:
      tests/test_orchestration_feature_state.py::TestRealRepositoryState::test_committed_state_next_eligible_stage_is_orch_001
      hard-codes the live governance document's recomputed
      next_eligible_stage as the literal string "ORCH-001", a transient fact
      rather than a durable invariant. Reproduced independently, including
      via the real `transition` CLI subcommand (not just a hand-edit) driving
      ORCH-001 to REVIEW_APPROVED against a throwaway copy of the real
      committed state file: `recompute_next_eligible` deterministically
      returns "ORCH-002" once ORCH-001 is REVIEW_APPROVED (as it must,
      correctly, since ORCH-002's sole prerequisite is then satisfied), which
      this pinned test asserts must never happen. Because ORCH-002's own
      allowed paths (stages/ORCH-002.md) do not include
      tests/test_orchestration_feature_state.py, no future session has
      authority to fix this test once ORCH-001 becomes REVIEW_APPROVED (that
      status is immutable per session-protocol.md section 2 except by a
      reviewed plan amendment marking it SUPERSEDED) -- the only session with
      both the authority (ORCH-001's own allowed paths) and the opportunity
      (ORCH-001 still short of REVIEW_APPROVED) to fix it is a REMEDIATOR
      acting now, before approval. Left unfixed, every subsequent session's
      required `pytest -q` full-suite run across the rest of the ORCH
      delivery pipeline (ORCH-002 through ORCH-027) would show one
      permanently, spuriously failing test. ORCH-001 is therefore returned to
      REVIEW_REJECTED rather than REVIEW_APPROVED (history sequence 27;
      VERIFIED -> REVIEW_REJECTED) on F-3 alone; F-1/F-2 are not
      re-litigated and remain confirmed fixed. Severity remains HIGH pending
      the F-3 remediation and a further independent review, distinct from
      claude-code-implementer-1, claude-code-independent-reviewer-orch-001-1,
      claude-code-remediator-orch-001-1 and
      claude-code-independent-reviewer-orch-001-2.
      Remediated 2026-07-21 by a distinct REMEDIATOR session
      (claude-code-remediator-orch-001-2, history sequences 28-30,
      evidence/ORCH-001/20260721T141500Z-claude-code-remediator-orch-001-2-943a0e4c.yaml),
      scoped to tests/test_orchestration_feature_state.py and this ORCH
      state/evidence/handoff only (no change to
      scripts/orchestration_feature_state.py, F-1/F-2, session-protocol.md,
      implementation-plan.md, implementation-state.schema.yaml or any
      stages/*.md). The pinned
      TestRealRepositoryState.test_committed_state_next_eligible_stage_is_orch_001
      was removed and replaced by a durable invariant helper
      (_assert_frontier_is_durable_invariant) and three stage-name-free tests:
      the recomputed frontier must equal the document's declared
      next_eligible_stage, be null or a member of delivery_order, and (when
      non-null) be itself non-approved with all prerequisites REVIEW_APPROVED.
      The frontier is discovered dynamically and the approval scenario is
      driven through the real CLI `transition` subcommand against an isolated
      throwaway copy of the real committed state file, proving the tests pass
      both while ORCH-001 is REVIEW_REJECTED/VERIFIED and after a correct
      ORCH-001 -> REVIEW_APPROVED transition advances the frontier to ORCH-002
      (evidence/ORCH-001/logs/20260721T141500Z-claude-code-remediator-orch-001-2-943a0e4c-f3-durability-probe.py,
      F3_DURABILITY_PROBE: PASS), whereas the removed pinned assertion would
      then fail. Focused suite 74 -> 76, full pytest -q 758 -> 760, validator
      validate against the real committed state PASS, workflowctl verify PASS.
      Severity left HIGH: per session-protocol.md section 6 a REMEDIATOR may
      not approve its own fix, so this awaits a further independent review by
      an actor distinct from claude-code-implementer-1,
      claude-code-independent-reviewer-orch-001-1,
      claude-code-remediator-orch-001-1,
      claude-code-independent-reviewer-orch-001-2 and
      claude-code-remediator-orch-001-2.
      Independently re-reviewed and RESOLVED 2026-07-21 by a sixth distinct
      actor (history sequence 31; reviewer
      claude-code-independent-reviewer-orch-001-3,
      reviews/ORCH-001/20260721T151500Z-claude-code-independent-reviewer-orch-001-3-fc81244b.yaml),
      distinct from claude-code-implementer-1,
      claude-code-independent-reviewer-orch-001-1,
      claude-code-remediator-orch-001-1,
      claude-code-independent-reviewer-orch-001-2 and
      claude-code-remediator-orch-001-2. F-1/F-2 need no re-litigation:
      scripts/orchestration_feature_state.py is byte-identical between f89be9b
      (where they were confirmed fixed) and the reviewed HEAD cfcdac3 -- an
      empty diff -- with the BLOCKED -> IN_PROGRESS gate intact at lines
      936-963 and all four F-2 tests passing. F-3 is confirmed fixed and
      durable: the pinned assertion is gone, a bounded static scan of the whole
      TestRealRepositoryState class finds no remaining literal stage name
      asserted against the live document (the one surviving literal is guarded
      by a dynamically discovered frontier and self-disables on approval), and
      the replacement invariant's three properties were independently checked
      against session-protocol.md section 1.8 and recompute_next_eligible's
      contract. Verified by a freshly authored post-approval probe,
      methodologically distinct from all three prior probes (which each
      operated on a single copied state file): it exports the entire committed
      tree at HEAD via git archive into a throwaway directory, drives the real
      CLI transition to ORCH-001 REVIEW_APPROVED inside that copy with the CAS
      digest guard engaged, then runs the real pytest suite inside that copy so
      TestRealRepositoryState resolves to a genuinely post-approval document,
      and re-derives the frontier from session-protocol.md's rule rather than
      calling the tool under review
      (reviews/ORCH-001/logs/20260721T151500Z-claude-code-independent-reviewer-orch-001-3-fc81244b-post-approval-probe.py,
      REVIEWER3_POST_APPROVAL_PROBE: PASS, 22 checks, 0 failures). The
      simulated frontier becomes ORCH-002 by three independent measures, the
      post-approval document validates, the durable invariant holds (75 passed
      / 1 skipped, 0 failed inside the copy), the removed pin would now fail,
      ORCH-002 stays NOT_STARTED, and the real governance document was
      confirmed byte-identical afterwards. All stage-required commands
      reproduced the recorded results, two of them byte-for-byte by stdout
      digest (focused suite 76 passed, sha256:180c3ff6...2289; validate PASS,
      sha256:30e51890...d9ea, state_digest sha256:d3cc44ba...13c0); full
      pytest -q 760 passed; workflowctl verify PASS; git diff --check clean.
      Changed-path scope (b9813b6..cfcdac3, 22 paths) is entirely within
      ORCH-001's allowed set, no production source changed at all, and no prior
      evidence or review record was overwritten. This risk is therefore closed
      on substance; the severity label is left HIGH for the historical record,
      following the R-REMEDIATION-AMENDMENT-UNREVIEWED precedent. One
      non-blocking observation (O-1, LOW) was recorded rather than a finding:
      test_frontier_invariant_survives_a_real_cli_approval_of_the_frontier
      self-skips whenever the current frontier lacks a VERIFIED-grade
      implementation, so from this approval until ORCH-002 reaches VERIFIED,
      pytest -q reports 759 passed / 1 skipped. This was explicitly evaluated
      and judged acceptable, not a material coverage gap: the skip is
      semantically necessary (NOT_STARTED -> REVIEW_APPROVED is not a legal
      transition, so the only alternative would fabricate an approval of an
      unimplemented stage), the mechanism under test retains unconditional
      synthetic-fixture coverage
      (test_review_approved_success_recomputes_next_eligible,
      test_status_after_approval_advances_frontier), the skip is visible with a
      reason rather than a silent pass, and it re-arms automatically exactly
      when it next matters; any fix that removed it would re-pin a stage name
      and reintroduce the F-3 defect class. No remediation is required.

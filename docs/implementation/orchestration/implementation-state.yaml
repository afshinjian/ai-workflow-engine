  reason: >-
    IMPLEMENTER remediation session (claude-code-implementer-orch-003-1), the
    same actor that produced the first two uncommitted ORCH-003 rounds, still
    distinct from every actor recorded against ORCH-000, ORCH-001 and
    ORCH-002. A further human implementation review of the F-1..F-7
    remediation found two more blocking findings, F-8 and F-9 (full text and
    full resolution recorded in stages.ORCH-003.blockers[1]). Nothing had
    been committed between any of the three rounds; main and origin/main
    remain e9f63a81041ba528055948890d5623087b62dae8 throughout, matching
    stages.ORCH-003.expected_base_head.

    Summary of fixes: (F-8) unsupported filesystem entries (FIFO, Unix
    socket, device node) were silently omitted by _iter_entries_safe; fixed
    by yielding a three-way kind ("file"/"symlink"/"unsupported") instead of
    a symlink-only boolean, classifying anything else via a new
    _classify_unsupported helper that determines the entry's type solely
    from a no-follow lstat and never opens it (so a FIFO can never block the
    scan). A new EntryType value "unsupported" and QuarantineReason
    "UNSUPPORTED_ENTRY_TYPE" were added; build_backup_plan/build_recovery_plan
    now exclude "unsupported" entries the same way they already excluded
    "unreadable" ones (incomplete_paths, complete=False), and
    BackupPlanEntry's validator structurally forbids ever representing one.
    (F-9) mutation detection previously only compared the directory's
    filename set after reading (F-7), missing a same-path, same-filename
    content change during inspection; fixed with a new _verify_unchanged
    helper that re-reads a path one final time via the same safe no-follow
    reader and is now called on every member of every family --
    approvals, agent-run pairs, prompt pairs, and workflow-event history
    groups (added alongside, not instead of, the existing F-7 directory
    re-listing check) -- immediately before returning a KNOWN classification;
    any mismatch, including a race into becoming a symlink, quarantines the
    affected member(s) SOURCE_MUTATED_DURING_SCAN. The digest used for a
    successful KNOWN record is always the first read's bytes, so stable
    inputs are provably unaffected.

    F-1 through F-7 were preserved unweakened: all 126 tests from the prior
    round still pass verbatim, and only models.py, legacy_readers.py, and
    plan.py changed this round (apply.py, errors.py, inspect.py,
    schema/migration.py, and cli.py are byte-identical to the prior round).


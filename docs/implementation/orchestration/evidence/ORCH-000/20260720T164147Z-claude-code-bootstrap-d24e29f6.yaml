decisions:
  - id: DEC-1
    summary: >
      Treat evidence/ORCH-000/ as an allowed implementation-evidence
      location for this stage, even though ORCH-000.md's "Exact allowed
      files or directories" line lists only reviews/ORCH-000/,
      handoffs/ORCH-000/ and implementation-state.yaml (omitting
      evidence/ORCH-000/ explicitly, unlike ORCH-001.md which spells out
      "ORCH state/evidence/handoff").
    rationale: >
      ORCH-000.md's own "Handoff state written for the next session"
      section requires "Add immutable evidence/<stage>/<implementation-id>.yaml"
      (identical boilerplate to every other stage file). implementation-plan.md's
      "Common stage contract" (section 2, item 6) requires every implementation
      session to write evidence/<stage-id>/<implementation-id>.yaml.
      implementation-state.schema.yaml's semantic-rule comment requires
      "passed implementation evidence... at VERIFIED". Treating the narrower
      allowed-files line as exhaustive would make VERIFIED unreachable for
      ORCH-000 by any legal path, contradicting the task mandate to resolve
      the bootstrap gap. This is read as an editorial omission in the
      per-stage section, not a deliberate architectural exclusion, since nothing
      else in the package or Architecture v3 states ORCH-000 must skip
      implementation evidence. No source or governance file outside
      docs/implementation/orchestration/ was touched.
  - id: DEC-2
    summary: >
      Set repository.package_commit and stages.ORCH-000.expected_base_head/
      implementation_commit to a676e0bc128494085f85f8f79f62aa8aac64bbd1
      (the full 40-hex commit OID for short ref a676e0b) rather than creating
      a new implementation commit.
    rationale: >
      The bootstrap mandate is explicit that the already-committed design
      package is the implementation subject; the schema/semantic rules allow
      implementation_commit to be set by the implementer for this exact
      bootstrap circumstance and require it for REVIEW_APPROVED later.
  - id: DEC-3
    summary: >
      Set package_status to PUBLISHED, not the literal string "COMMITTED"
      requested in the task prompt, because implementation-state.schema.yaml's
      package_status enum is exactly [DRAFT, PENDING_HUMAN_COMMIT, PUBLISHED,
      SUPERSEDED] and does not contain a COMMITTED value.
    rationale: >
      The task's own instructions require using only exact schema-permitted
      enum values and forbid inventing new ones. PUBLISHED is the only
      enum value consistent with "the human owner has committed the exact
      reviewed documentation package to version control"; DRAFT and
      PENDING_HUMAN_COMMIT no longer apply post-commit, and SUPERSEDED would
      wrongly imply the package was replaced by a later revision.
  - id: DEC-4
    summary: >
      Set repository.working_tree_policy to CLEAN_REQUIRED (from
      DESIGN_PACKAGE_PENDING_HUMAN_COMMIT).
    rationale: >
      session-protocol.md section 1.5 states the DESIGN_PACKAGE_PENDING_HUMAN_COMMIT
      exception applies only while the design package itself is uncommitted;
      normal CLEAN_REQUIRED governs all sessions once the package is committed.
  - id: DEC-5
    summary: >
      Set current_stage and next_eligible_stage to ORCH-000 (not null),
      reflecting that ORCH-000 (having no prerequisites) is the single stage
      exposed by the state file, now with VERIFIED status awaiting only the
      independent ORCH-000 review action. candidate_next_stage remains
      ORCH-000, unchanged.
    rationale: >
      implementation-state.schema.yaml's semantic-rule comment defines
      next_eligible_stage as "the first non-approved delivery-order entry
      whose prerequisites are REVIEW_APPROVED... null whenever a global
      blocker exists". ORCH-000's prerequisites are vacuously satisfied
      (empty list) and, with DESIGN_PACKAGE_NOT_COMMITTED resolved, no
      global blocker remains, so next_eligible_stage must be non-null and
      equal to ORCH-000. This does not make any production stage (ORCH-001+)
      eligible, since ORCH-000 is not REVIEW_APPROVED.
  - id: DEC-6
    summary: >
      review_status set to PENDING and reviewer left null; verification_status
      set to PASSED; review_evidence left empty; no REVIEW_APPROVED/REJECTED
      value written anywhere.
    rationale: >
      session-protocol.md section 4 ("Implementation session") states "On
      success advance through IMPLEMENTED to VERIFIED; set review pending."
      Only an independent REVIEWER may set APPROVED/REJECTED
      (section 1.2 legal-transition table); this session is IMPLEMENTER/
      HUMAN_OWNER and explicitly forbidden from rendering a verdict.

decisions:
  - id: DEC-A1
    summary: >
      Ratify D3-016's stage-contract text unchanged rather than rewriting
      stages/ORCH-000.md's substantive content a second time.
    rationale: >
      The second review explicitly found that D3-016's amendment content
      "still correctly resolves conceptually" and that the only defect was
      authority, not substance. Rewriting the same text again would not
      address F-4/F-5/F-6 and would create a third, needlessly divergent
      version of the same clause. This session instead supplies the missing
      authorization (this history entry, this evidence) and version
      increment, and leaves D3-016's text as-is.
  - id: DEC-A2
    summary: >
      Do not widen stages/ORCH-000.md's "Exact allowed files or directories"
      list to include itself or decision-log.md.
    rationale: >
      F-6 found that widening a stage's own allowed-paths list to cover
      editing the list itself is circular and does not establish a genuine
      external authority boundary. Instead, authority for this class of edit
      is placed one level up, in session-protocol.md's new
      governance-amendment-authorization procedure, which by construction
      cannot be invoked by an ordinary implementer/remediator session. A
      pointer (not a grant) is added to stages/ORCH-000.md so this is
      discoverable without widening its own sandbox.
  - id: DEC-A3
    summary: >
      Increment plan_version (1.0.0 -> 1.1.0), not architecture_version.
    rationale: >
      Every document this amendment edits (session-protocol.md,
      decision-log.md, implementation-plan.md's own version line,
      stages/ORCH-000.md) is a plan-level artifact under
      implementation-plan.md's authority. architecture-v3.md's normative
      design content is untouched, so architecture_version (3.0.0) is
      correctly left unchanged.
  - id: DEC-A4
    summary: >
      Delegate F-7's mechanical fix (re-capturing and committing the first
      rejection review's missing .log-referenced artifacts under
      reviews/ORCH-000/logs/) to the next REMEDIATOR rather than performing
      it in this session.
    rationale: >
      F-7 is LOW severity and non-blocking, and its fix is a mechanical
      re-run-and-recapture of already-specified commands within paths
      (reviews/ORCH-000/, evidence/ORCH-000/) already authorized by
      stages/ORCH-000.md's own (unwidened) allowed-paths list -- it requires
      no contract amendment and no ARCHITECT/HUMAN_OWNER authority. Per this
      session's own operating constraints, remediation-type work (running
      stage verification commands and writing implementation evidence) is
      left to a REMEDIATOR session, not performed here. The exact scope is
      recorded in decision-log.md D3-017's "Delegated remediation scope"
      paragraph and in this evidence's next_required_action.
  - id: DEC-A5
    summary: >
      This session does not change stages.ORCH-000.status or review_status;
      it adds a blocker (GOVERNANCE_AMENDMENT_PENDING_REMEDIATION) instead.
    rationale: >
      session-protocol.md's transition table does not give ARCHITECT/
      HUMAN_OWNER a status-changing transition for this case (only
      SUPERSEDED, which does not apply -- this stage is not being
      superseded). ORCH-000 must remain REVIEW_REJECTED (unapproved) per
      task instruction; the blocker records, machine-readably, that a
      REMEDIATOR session must still act before the next independent review.

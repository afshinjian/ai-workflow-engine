decisions:
  - id: DEC-R3-1
    summary: >
      Fix F-8 by adding a new implementation evidence record with
      environment_fingerprint_digest on every command record, rather than
      editing the deficient record (...-8387417f.yaml) in place.
    rationale: >
      session-protocol.md section 7 states "Never overwrite an evidence
      record; add a new one and append state history," and section 6
      states a remediation session "produces a new implementation
      ID/evidence ... It cannot erase prior evidence." Editing the existing
      record's command entries in place, even only to add a missing field,
      would be exactly the overwrite the protocol forbids. The deficient
      record is retained unchanged in stages.ORCH-000.evidence alongside
      this new one.
  - id: DEC-R3-2
    summary: >
      Capture a fresh environment-fingerprint artifact this session and
      confirm its digest is byte-identical to the value already used by
      both F-8-compliant prior records and the rejecting review's own
      capture, rather than copying the digest value from those records
      without independent reproduction.
    rationale: >
      The rejecting review (F-8 failure_mode) specifically requires that a
      fresh session reproducing this candidate from repository state alone
      can verify what tool/runtime/OS environment identity produced the
      command results; asserting the digest without recomputing it this
      session would repeat the same category of unverifiable-claim defect,
      just for a different field.
  - id: DEC-R3-3
    summary: >
      Do not re-run `git rev-parse HEAD` as an "after" command; HEAD is
      recorded identically in `head.starting` and `head.ending` (this
      session leaves an uncommitted diff, so HEAD does not advance).
    rationale: >
      Mirrors the prior F-7 remediation's own command set
      (evidence/ORCH-000/20260720T210000Z-claude-code-remediator-2-8387417f.yaml),
      which likewise omitted a redundant post-edit `git rev-parse HEAD`
      since no commit occurs in this session.
  - id: DEC-R3-4
    summary: >
      review_status set to PENDING (not APPROVED); reviewer set to null
      (not carried forward as claude-code-independent-reviewer-3, since that
      actor's own verdict is the rejection being remediated here); no
      REVIEW_APPROVED/REVIEW_REJECTED value written anywhere in this record.
    rationale: >
      session-protocol.md section 6: a remediation session "cannot alter
      the rejection finding or approve its fix." Only an independent
      REVIEWER may set APPROVED/REJECTED. This session is REMEDIATOR and
      explicitly forbidden from rendering a verdict on either the original
      candidate or its own fix.

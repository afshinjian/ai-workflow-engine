decisions:
  - id: DEC-R1
    summary: >
      Amend stages/ORCH-000.md and decision-log.md directly, even though
      neither path is listed in stages/ORCH-000.md's own (pre-amendment)
      "Exact allowed files or directories" section.
    rationale: >
      Both are governance/package-level documents outside any single stage's
      own allowed-path sandbox. implementation-plan.md section 1 gates
      exactly this kind of out-of-scope change behind "a reviewed plan
      amendment," not a normal implementer's unilateral in-scope write. This
      is precisely what the review's remediation_scope required ("obtain an
      architect-reviewed plan amendment to stages/ORCH-000.md"). Unlike the
      rejected DEC-1 (an implementer inventing its own authorization
      mid-session with no external direction), this amendment is made under
      explicit, separate task instruction to remediate exactly this
      governance gap, is fully documented with rationale in decision-log.md
      D3-016 before any new evidence was written under the newly-authorized
      evidence/ORCH-000/ path, and does not confer approval on itself: see
      DEC-R4.
  - id: DEC-R2
    summary: >
      Retain (not delete or supersede) evidence/ORCH-000/20260720T164147Z-claude-code-bootstrap-d24e29f6.yaml
      and its logs; list it first in stages.ORCH-000.evidence alongside this
      session's new entry.
    rationale: >
      F-1/F-2 are scope/specification defects in where that evidence was
      permitted to live and in the stage contract that should have permitted
      it -- not defects in the evidence's substance. The design package it
      verifies (a676e0b) is unchanged; the rejecting reviewer independently
      reran the same commands from a separate session and got matching or
      byte-identical results, recording verification_status: PASSED even
      while rejecting on scope grounds. Full admissibility ruling (Outcome A)
      in decision-log.md D3-016.
  - id: DEC-R3
    summary: >
      Set stages.ORCH-000.implementation_commit to null (not carried forward
      from a676e0b) and expected_base_head to this session's starting HEAD
      17111c781072260a51d08ba077fed8fba8b8dcd6.
    rationale: >
      This session's diff is a new, currently uncommitted implementation,
      unlike the bootstrap session's already-committed, no-new-diff special
      case (its own DEC-2). The general rule applies instead
      (session-protocol.md section 2): implementation_commit stays null until
      a human commits this diff; the next reviewer sets it to the clean HEAD
      it actually reviews. expected_base_head follows section 1.6 ("For an
      implementation start, record current HEAD as the selected stage's
      expected_base_head").
  - id: DEC-R4
    summary: >
      review_status set to PENDING (not APPROVED); reviewer left at its
      prior value (claude-code-independent-reviewer, a historical record,
      not an assignment); no REVIEW_APPROVED/REVIEW_REJECTED value written
      anywhere; a new R-REMEDIATION-AMENDMENT-UNREVIEWED risk was added.
    rationale: >
      session-protocol.md section 6: a remediation session "produces a new
      implementation ID/evidence and returns to VERIFIED. It cannot erase
      prior evidence" and "cannot alter the rejection finding or approve its
      fix." Only an independent REVIEWER may set APPROVED/REJECTED. This
      session is REMEDIATOR and explicitly forbidden from rendering a
      verdict on either the original candidate or its own amendment.
  - id: DEC-R5
    summary: >
      Command-log artifacts for this session use .txt/.json extensions, not
      .log; the root .gitignore is not modified.
    rationale: >
      The repository's root .gitignore excludes *.log; the 8 pre-existing
      logs under evidence/ORCH-000/logs/ from the prior two sessions are
      already tracked (force-added previously) and were left untouched by
      this session. Rather than depend on the same undocumented git add -f
      pattern for new artifacts, or widen the root .gitignore (which would
      touch a file outside docs/implementation/orchestration/, expanding
      this remediation's change scope beyond what F-1/F-2/F-3 require), this
      session's own new logs use non-ignored extensions and the amended
      stages/ORCH-000.md documents this as the standing convention for this
      stage's evidence going forward.

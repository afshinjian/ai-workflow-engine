    summary: >
      Recover the five F-7 artifacts by verifying and recommitting their
      already-produced, digest-matching content, rather than by literally
      re-invoking git rev-parse HEAD / git status against today's HEAD.
    rationale: >
      HEAD has legitimately advanced since the first review (46898ec ->
      19d47dc across the amendment/remediation chain). A fresh
      `git rev-parse HEAD` today would return a different value than the
      review's own already-committed `result` field (46898ec...), which this
      session must not alter (task scope: fix only the missing artifacts,
      never the review's recorded verdict/findings/results). The five
      untracked working-tree files were verified byte-for-byte identical to
      the digests the review evidence already recorded, proving they are
      that review's genuine, unaltered original output; recommitting that
      content is the faithful fix. git show --stat a676e0b, pytest -q, and
      the validate-orch-state script are independently rerun as part of this
      session's own required verification (see commands, when: before/after)
      and reconfirm PASS/684-passed against current repository state, which
      is the standard remediation practice this task's Validation section
      also requires -- but that is a distinct check from recapturing the
      first review's own historical artifact, which is what F-7 required.
  - id: DEC-R2-2
    summary: >
      Name the five recaptured artifacts with the owning review's own ID
      prefix (20260720T172520Z-claude-code-independent-reviewer-59f68d54-*),
      not this session's own ID.
    rationale: >
      These files are the first review's own evidence, being recovered into
      committed form, not new evidence produced by this session. Prefixing
      with the reviewing session's own ID keeps attribution correct and
      avoids colliding with the second review's already-committed
      20260720T194000Z-claude-code-independent-reviewer-2-b7e21ac4-* files in
      the same directory, mirroring the disambiguation convention the prior
      remediator (e27efbe4, DEC-R5) already established for this stage.
  - id: DEC-R2-3
    summary: >
      Change only the five stdout_artifact path fields in
      reviews/ORCH-000/20260720T172520Z-claude-code-independent-reviewer-59f68d54.yaml;
      leave stdout_digest, result, verdict, findings, checklist and
      remediation_scope untouched; do not add new top-level fields to that
      file.
    rationale: >
      Task scope forbids altering the review's recorded verdict or findings
      text. session-protocol.md section 7 states ReviewEvidence 1.0.0
      "unknown fields fail" validation, so no new top-level field was added;
      the fix is confined to the exact field (stdout_artifact) whose value

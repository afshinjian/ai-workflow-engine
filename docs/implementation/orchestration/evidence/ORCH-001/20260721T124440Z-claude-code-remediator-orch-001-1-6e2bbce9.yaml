decisions:
  - id: DEC-1
    summary: >
      Add the BLOCKED -> IN_PROGRESS gate as a new conditional block in
      apply_transition, structurally mirroring the pre-existing
      NOT_STARTED -> IN_PROGRESS gate, rather than adding a new
      validate_semantics rule.
    rationale: >
      The rejecting review's remediation_scope explicitly scoped the fix to
      apply_transition ("(a) add an explicit BLOCKED -> IN_PROGRESS gate in
      apply_transition"). apply_transition is the sole write path
      (session-protocol.md's "transition ... the only write path"); gating
      it there prevents the illegal transition from ever being constructed,
      which is strictly stronger than only detecting it after the fact in
      validate_semantics. This also avoids adding a new semantic rule not
      named in implementation-state.schema.yaml's comment block, keeping
      the diff narrower and avoiding any risk of "weakening validate_state"
      by touching that function's rule set.
  - id: DEC-2
    summary: >
      A blocker counts as "resolved" for this gate if it already carries a
      non-null resolution, OR if this same apply_transition call resolves
      it via resolve_blockers.
    rationale: >
      Mirrors the existing pattern of accepting a blocker
      add/resolve within the same call (see resolve_blockers' existing
      semantics in apply_transition), and matches
      test_blocked_with_blocker_succeeds_and_resolve_reopens' existing,
      preserved usage (resolve_blockers supplied in the same call that
      performs the BLOCKED -> IN_PROGRESS transition). Requiring resolution
      to have happened in a strictly prior call would break that existing,
      passing test and contradict the CLI's single-transition-per-call
      design.
  - id: DEC-3
    summary: >
      The prerequisite check recomputes each prerequisite's status directly
      from stages (status == "REVIEW_APPROVED"), not via
      recompute_next_eligible.
    rationale: >
      recompute_next_eligible answers "what is the next eligible stage
      overall", a different question from "are this specific stage's
      prerequisites still approved". Using it here would incorrectly couple
      the gate to global eligibility/ordering rather than to the stage's
      own prerequisites list, and would raise a confusing error unrelated
      to the actual defect (an unapproved prerequisite). Reusing the same
      REVIEW_APPROVED-closure predicate already used by
      recompute_next_eligible (just applied to this stage's own
      prerequisites list) keeps the semantics consistent without coupling
      to global frontier state.
  - id: DEC-4
    summary: >
      Hand-edit implementation-state.yaml's ORCH-001 entry, history and
      last_updated (via a text editor), rather than invoking the fixed
      `transition` subcommand against the real governance file.
    rationale: >
      Same rationale as the original implementer's DEC-3
      (evidence/ORCH-001/20260721T115508Z-claude-code-implementer-1-02891aae.yaml):
      write_state_atomic's yaml.safe_dump would reformat the entire
      ~700-line hand-authored flow-style document into block style, an
      out-of-scope stylistic change. The transition subcommand's write path
      (including this session's new gate) is instead exercised exclusively
      against isolated temporary/in-memory fixtures in
      tests/test_orchestration_feature_state.py and the standalone
      demonstration probe. The hand-edit was independently re-validated
      against the tool's own `validate` subcommand (see the "after" command
      results above) to confirm it is structurally and semantically
      indistinguishable from a tool-produced result.
  - id: DEC-5
    summary: >
      Update the R-ORCH-001-VALIDATOR-CORRECTNESS disposition to record the
      fix, but leave its severity HIGH and do not mark it resolved.
    rationale: >
      session-protocol.md section 6/"Governance-amendment authorization"
      and the general remediator/reviewer independence rule: "A remediation
      session cannot ... approve its fix." Only a subsequent independent
      reviewer, distinct from claude-code-implementer-1,
      claude-code-independent-reviewer-orch-001-1 and this session's actor,
      can confirm the fix is sound and mark the risk resolved.

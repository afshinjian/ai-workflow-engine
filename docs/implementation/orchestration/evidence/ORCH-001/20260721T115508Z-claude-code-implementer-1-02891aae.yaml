decisions:
  - id: DEC-1
    summary: >
      Implement the validator as a standalone script (scripts/) with zero
      new third-party dependencies (stdlib + PyYAML only), hand-encoding
      JSON-Schema-equivalent structural checks rather than adding a
      `jsonschema` dependency to pyproject.toml.
    rationale: >
      pyproject.toml is not in this stage's allowed paths
      (scripts/orchestration_feature_state.py,
      tests/test_orchestration_feature_state.py, ORCH state/evidence/
      handoff only), and `jsonschema` is not installed in the project's
      conda environment. Adding a dependency would be an out-of-scope
      change requiring a plan amendment. The schema is small and stable
      (implementation-state.schema.yaml), so a direct, fully-tested
      hand-implementation is both in-scope and auditable.
  - id: DEC-2
    summary: >
      Use `git stash push -u` / `pop` to obtain a true pre-change "before"
      snapshot, rather than treating the moment this session started
      writing code as "before".
    rationale: >
      This session's own new files (the validator and its tests) were
      already on disk once written; running "before" commands after that
      point would silently validate against a state that already includes
      the change under test. Stashing (including untracked files, `-u`)
      restores the exact starting HEAD's working tree for the "before"
      capture, then is popped back immediately after.
    verification: >
      `git rev-parse HEAD` before and after the stash round-trip both
      equal 46ded3e51e8a90a8292d1c2721b565d62838caca; `git status
      --porcelain -b` after the pop shows exactly the same untracked files
      as before the stash, confirming a lossless round-trip.
  - id: DEC-3
    summary: >
      Update implementation-state.yaml's ORCH-001 stage entry and history
      by hand (via a text editor), rather than by invoking this session's
      own new `transition` subcommand against the real governance file.
    rationale: >
      The new validator's `write_state_atomic` uses `yaml.safe_dump`,
      which reformats the entire document into block style; the real
      implementation-state.yaml is hand-authored with one-line flow-style
      stage/history entries (see every prior ORCH-000 evidence record and
      D3-016/D3-017 in decision-log.md). Applying the tool directly would
      silently reformat ~700 unrelated lines, obscuring the actual diff
      and constituting an out-of-scope stylistic change
      ("do not opportunistically fix unrelated issues",
      session-protocol.md). The `transition` subcommand's write path
      (CAS digest, atomic replace, history append, legal-edge/role
      checks) is instead exercised exclusively against isolated temporary
      files in tests/test_orchestration_feature_state.py, per
      stages/ORCH-001.md's "Tests use isolated temporary repositories/data
      roots and must not mutate real governance." The hand-edit was
      independently re-validated against the tool's own `validate`
      subcommand (see the "after" command results above) to confirm it is
      structurally and semantically indistinguishable from a
      tool-produced result.
  - id: DEC-4
    summary: >
      review_status is set to PENDING (not NOT_REQUESTED) and reviewer to
      null on reaching VERIFIED.
    rationale: >
      Matches the established convention from every prior ORCH-000
      session that returned the stage to VERIFIED (e.g.
      evidence/ORCH-000/20260720T223000Z-claude-code-remediator-3-6e1d7d18.yaml's
      handoff: "review_status: PENDING, reviewer: null"), signaling the
      stage now awaits an independent reviewer rather than "no review ever
      requested."
  - id: DEC-5
    summary: >
      implementation_commit is left null; next_eligible_stage,
      candidate_next_stage and current_stage are left unchanged at
      ORCH-001 (not advanced to ORCH-002).
    rationale: >
      session-protocol.md section 3: "implementation_commit may be null in
      the implementer's uncommitted handoff; the reviewer sets it to the
      clean HEAD it actually reviewed before approval." VERIFIED is not
      REVIEW_APPROVED, so the validator's own recompute_next_eligible
      correctly still resolves to ORCH-001 (confirmed by the final
      `validate`/`status` commands above) -- ORCH-002 only becomes
      eligible once ORCH-001 itself reaches REVIEW_APPROVED, which no
      implementer session may perform (session-protocol.md section 2).

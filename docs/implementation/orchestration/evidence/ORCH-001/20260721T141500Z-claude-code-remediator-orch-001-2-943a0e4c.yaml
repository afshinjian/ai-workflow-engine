decisions:
  - id: DEC-1
    summary: >
      Replace the pinned
      TestRealRepositoryState.test_committed_state_next_eligible_stage_is_orch_001
      (which asserted recompute_next_eligible == "ORCH-001") with a shared
      helper _assert_frontier_is_durable_invariant plus three stage-name-free
      tests, following approach (b) from the F-3 review's remediation_scope.
    rationale: >
      The review's remediation_scope offered (a) delete the test, (b) replace
      the hard-coded stage-name assertion with a durable invariant, or (c) any
      better fix. (b) preserves real, useful coverage of the frontier
      computation against the live governance document while removing the
      transient pin: the helper asserts exactly the three durable properties
      the review recommended -- recompute equals the document's declared
      next_eligible_stage; the frontier is null or a member of delivery_order;
      and, when non-null, the frontier is itself not REVIEW_APPROVED and every
      prerequisite is REVIEW_APPROVED. None names a stage, so none can re-break
      on legitimate advancement.
  - id: DEC-2
    summary: >
      Discover the frontier dynamically (recompute_next_eligible on the live
      document) rather than writing "ORCH-001"/"ORCH-002" literals into the
      real-state tests, and guard the one concrete ORCH-001 -> ORCH-002 anchor
      behind `if frontier == "ORCH-001"`.
    rationale: >
      Writing any specific stage name into a test that reads the real,
      advancing governance document -- even in a pre/post-approval helper --
      would reintroduce exactly the F-3 defect class (a transient fact encoded
      as a permanent assertion, unfixable by any downstream session once
      ORCH-001 is REVIEW_APPROVED). Discovering the frontier and using
      pytest.skip when there is nothing legitimately approvable makes the
      real-state tests correct for every future committed state, while the
      guarded literal anchor still documents and asserts the exact scenario
      F-3 named for as long as it remains true of the live document.
  - id: DEC-3
    summary: >
      Drive the post-approval scenario through the real CLI `transition`
      subcommand against an isolated throwaway copy of the real committed
      state file (VERIFIED precondition set on the copy only), rather than a

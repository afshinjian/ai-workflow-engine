decisions:
  - id: DEC-1
    summary: >
      Fix Finding A by adding command-shape-specific adapter helpers
      (_contract_v2_for_status_payload for state show/next/record,
      _contract_v2_for_agent_run_payload for agent run) plus small direct
      inline branches for inspect and _emit_prompt_success, rather than one
      universal dict-to-envelope function.
    rationale: >
      state's {status, command, finding} shape and agent-run's
      {status, verification: CheckResult, run_id, stage, ...} shape are
      genuinely different -- the latter nests a full CheckResult and has no
      "finding" key on success. A single generic adapter would have had to
      branch on shape internally anyway; two small, explicit, unit-testable
      functions are more legible and each is directly covered by its own tests.
  - id: DEC-2
    summary: >
      Insert every v2 branch strictly before the pre-existing v1 write
      statement in each command, and never modify that v1 statement itself.
    rationale: >
      This makes v1 byte-identity a structural guarantee, not just a tested
      property: since the exact same code path executes for contract_version
      == "1.0.0" as before this remediation, there is no way for a v2-oriented
      change to accidentally alter v1 output. The new v1-byte-compatibility
      tests (one per command family) exist to prove this claim, not to
      discover whether it holds.
  - id: DEC-3
    summary: >
      Give _protected and _config new output/command keyword-only parameters
      with safe HUMAN/"command" defaults, and thread the real output/command
      through every call site in cli.py, rather than making them required
      positional parameters.
    rationale: >
      Keyword-only with safe defaults means a future call site that forgets to
      pass them degrades to the pre-existing stderr/exit-2 behavior (safe,
      matches old behavior) rather than raising a TypeError or silently
      emitting a wrongly-labeled v2 envelope. All nine actual _protected call
      sites and the eight _config call sites in the current file do pass them
      explicitly (verified by grep and by the new operational-failure tests
      reaching check-handover, prompt plan-review, agent run and commit).
    grep_verification: >-
      grep -c '_protected(' src/ai_workflow_engine/cli.py and
      grep -c '_config(' src/ai_workflow_engine/cli.py, cross-checked by
      inspection that every match either defines the function or passes
      output=/command= explicitly.
  - id: DEC-4
    summary: >
      Deterministic v2 error code = type(exc).__name__; retryable is always
      False for _protected-caught exceptions.
    rationale: >
      A stable, mechanically-derivable code beats inventing a bespoke taxonomy
      for this stage's scope; every exception _protected can catch here
      (InvalidConfigurationError, ApprovalError, typer.BadParameter, and any
      other Exception subclass) already has a stable __name__. retryable=False
      is conservative and correct for this class of error: bad config, a
      missing/malformed approval file, or an invalid CLI parameter will not
      succeed on a bare retry without the caller changing something.
  - id: DEC-5
    summary: >
      Leave the invalid-contract-version failure path (the callback's
      try/except around resolve_contract_version) using the v1/stderr shape
      unconditionally, and add an explicit comment plus a dedicated test
      rather than silently changing it to emit a v2-looking envelope.
    rationale: >
      Before a contract version is resolved, there is no principled envelope
      to emit -- selecting v2's shape for this one failure would assume the
      answer to the very question that failed to resolve. This was already
      the (correct) behavior before this remediation; the fix here is
      documentation and test coverage, not a behavior change, so that a future
      session does not "fix" this into an inconsistency.
  - id: DEC-6
    summary: >
      Implement Finding C as a single model_validator(mode="after") on
      ContractEnvelopeV2 rather than validating at each of
      success_envelope/error_envelope's call sites.
    rationale: >
      A model-level validator runs on every construction path, including
      model_validate (used by SchemaRegistry.dispatch for external/schema
      input), which a builder-only check could never reach. This is the
      difference this session tested explicitly
      (test_contradictory_combination_rejected_via_registry_dispatch).
  - id: DEC-7
    summary: >
      Hand-edit implementation-state.yaml's ORCH-002 entry (adding the
      blocker), history (sequences 35-38) and last_updated, rather than
      invoking the transition subcommand four times against the real
      governance file.
    rationale: >
      Same rationale as every prior ORCH-000/ORCH-001/ORCH-002 session:
      write_state_atomic's yaml.safe_dump would reformat the entire flow-style
      document into block style, an out-of-scope stylistic change. The
      blocker's summary/resolution text is long prose, so it is expressed as
      single-line YAML flow scalars (single-quoted, sort_keys=False via
      yaml.dump used only to generate the literal text, not to write the
      file) to stay syntactically valid inside the document's existing
      flow-style stage records -- an earlier attempt using block-scalar (">-")
      syntax inside the flow mapping was caught by this session's own
      `python -c "import yaml; yaml.safe_load(...)"` re-parse before it was
      left in place, and corrected.
    self_correction_note: >-
      This session made and caught its own YAML-syntax mistake (folded block
      scalars are not legal inside a flow ({}) mapping) by re-parsing the file
      with PyYAML immediately after every edit, per this stage's own
      discipline of never trusting an edit without independently reproducing
      its result. Recorded here rather than silently fixed and omitted,
      consistent with session-protocol.md's fail-closed spirit: evidence
      states what actually happened, not an idealized version of it.

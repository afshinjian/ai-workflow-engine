decisions:
  - id: DEC-1
    summary: >
      Implement a general-purpose SchemaRegistry (name, version) -> Pydantic
      model dispatch in src/ai_workflow_engine/schema/registry.py, and register
      the CLI's own contract under it (schema name "cli-contract", versions
      "1.0.0"/"2.0.0") in schema/contract.py, rather than hard-coding a
      CLI-specific version switch directly in cli.py.
    rationale: >
      Architecture v3 section 14 specifies "schema_name and schema_version" on
      every record generically, not just for the CLI contract; a reusable,
      closed registry that fails closed on any unregistered (name, version)
      pair is the primitive later stages (ORCH-004's execution-spec,
      ORCH-005's attempt-record, and so on) will also need, and this stage's
      objective explicitly names both "schema registry" and "CLI v2 envelope"
      as distinct deliverables.
  - id: DEC-2
    summary: >
      Register the legacy v1 CLI shape as CliContractV1, a Pydantic model with
      `extra="allow"` and no required fields, rather than modeling every
      existing command's distinct payload (CheckResult, VerificationReport,
      PromptSuccess, state payloads, ...) under one v1 schema.
    rationale: >
      The pre-existing JSON output was never a single envelope -- each command
      has always emitted its own shape. Registering v1 as "an open,
      command-specific object" states that fact explicitly and makes it
      dispatchable through the same registry as v2, rather than fabricating a
      fictitious common v1 envelope that never actually existed and that no
      real command's output would validate against if it were made strict.
  - id: DEC-3
    summary: >
      Wire `--contract-version` as a single global Typer app-callback option,
      resolved once via schema.contract.resolve_contract_version before any
      command body runs, using the exact `_protected`-style stderr/exit-2
      failure shape already established elsewhere in cli.py for an unknown or
      unsupported version -- rather than validating per-command or introducing
      a new error-reporting convention.
    rationale: >
      A single resolution point guarantees "unknown schema/version fails
      closed" and "exactly one JSON document on stdout" simultaneously: if
      resolution fails, no command body -- and therefore no JSON emission --
      ever runs, so there is no risk of a partial or malformed document
      reaching stdout. Reusing the established stderr/exit-2 convention (from
      `_protected`) keeps the CLI's error-reporting surface uniform instead of
      adding a second, inconsistent one.
  - id: DEC-4
    summary: >
      Route the v2 envelope through the existing shared `_emit` helper (used by
      check-git/check-task-state/check-governance/check-handover/commit/push/
      apply-patch) and a small addition to the `verify` command, using
      `result.check_name` (or the literal "verify") as the envelope's
      `command` field, rather than adding a `command` parameter to every call
      site or adding new domain commands.
    rationale: >
      This stage's non-goal is explicit: "No domain orchestration commands."
      Routing through the pre-existing shared emission points demonstrates
      correct v1/v2 dispatch on real, already-tested commands with a minimal,
      low-risk diff (three modified production files), and needed no change to
      any of the seven call sites of `_emit` itself.
  - id: DEC-5
    summary: >
      Derive the v2 error envelope's `code` from the check's `Status`
      (`CHECK_FAIL`/`CHECK_ERROR`), `message` from its `summary`, `retryable`
      from `status == ERROR`, and `details.findings` from its `Finding` list,
      rather than inventing a new per-check error taxonomy in this stage.
    rationale: >
      `CheckResult`/`VerificationReport` already carry a stable, tested
      status/summary/findings model (result.py); deriving the v2 error
      deterministically from that existing model keeps `code`/`message` stable
      across identical failures (verified by
      test_v2_envelope_shape_for_a_failing_check re-asserting the exact
      "CHECK_FAIL"/"branch_mismatch" values) without introducing a second,
      parallel error vocabulary this stage does not need to define.
  - id: DEC-6
    summary: >
      Hand-edit implementation-state.yaml's ORCH-002 entry, history (sequences
      32-34) and last_updated, rather than invoking the `transition`
      subcommand against the real governance file.
    rationale: >
      Same rationale as every prior ORCH-000/ORCH-001 session (DEC-4 in the
      prior stage's evidence): the transition subcommand's `yaml.safe_dump`
      would reformat the entire flow-style document into block style, an
      out-of-scope stylistic change. The hand-edit was independently
      re-validated against the tool's own `validate` subcommand (PASS,
      state_digest sha256:14cd5d86f471968fd2af6646fb4d8b0e78c9125895c02dcbe7980d2a2dd6a642)
      and `status` (frontier unchanged at ORCH-002; ORCH-003 unaffected) to
      confirm it is structurally and semantically indistinguishable from a
      tool-produced result.

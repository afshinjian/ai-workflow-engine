human_review_findings:
  - id: F-1
    title: Source root symlink traversal
    summary: >-
      A symlinked source root was resolved and scanned rather than rejected outright;
      Path.resolve() follows symlinks before any check that the root itself is one.
  - id: F-2
    title: Companion symlink traversal
    summary: >-
      A symlinked .patch/.md companion could be read via plain Path.read_bytes, following
      the symlink and never proving the entry was a regular, non-symlink file first.
  - id: F-3
    title: Duplicate YAML keys
    summary: >-
      Approval YAML was parsed with yaml.safe_load, whose default SafeLoader silently
      applies last-key-wins on a duplicate mapping key at every level.
  - id: F-4
    title: Incomplete backup/recovery plans
    summary: >-
      A validly-paired companion was folded into its primary's classification and never
      given its own manifest/backup-plan entry; a symlink's target-string digest could be
      mistaken for restorable file bytes; recovery steps were not type-aware.
  - id: F-5
    title: Digest seals not enforced
    summary: >-
      MigrationManifest/BackupPlan/RecoveryPlan format-checked digest fields as hex64 but
      never recomputed/verified them; apply_migration only compared caller-supplied digest
      strings rather than independently reverifying the sealed records.
  - id: F-6
    title: Incomplete legacy integrity validation
    summary: >-
      Artifacts were classified KNOWN on schema validity alone, without the same
      canonical-byte/content-hash/address/chain/transition-order checks their real
      verified stores (load_history/load_run/load) apply; a corrupt history member did not
      quarantine its independently-valid-looking siblings.
  - id: F-7
    title: Concurrent mutation/TOCTOU, and apply-before-refusal
    summary: >-
      migrate apply read and inspected the entire source tree via inspect_source before
      checking --dry-run; no TOCTOU detection existed for a directory mutated mid-scan.

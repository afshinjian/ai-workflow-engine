decisions:
  - id: DEC-1
    summary: >
      Fix F-1 with a dedicated _reject_symlink_root check using Path.is_symlink() (an
      lstat of the exact given path) before any resolve()/exists()/scan, rather than
      inspecting the resolved path afterward.
    rationale: >
      Path.resolve() itself follows symlinks to compute the real path; checking symlink-
      ness only AFTER resolving would already have "used" the symlink to compute a target
      path, even if no bytes were read yet. Checking the raw, unresolved path first is the
      only way to guarantee the target is never touched at all.
  - id: DEC-2
    summary: >
      Fix F-2/F-7 with a single shared no-follow-open primitive (_open_regular_nofollow /
      _read_regular_nofollow) used for every file read in the module -- primaries,
      companions, and "unknown" entries alike -- rather than a companion-specific check.
    rationale: >
      A uniform safe-read primitive means every read site automatically gets TOCTOU
      protection, including ones a future extension of this module might add, rather than
      relying on each call site to remember to check is_symlink() first (which is itself
      race-prone, since a separate lstat-then-open is not atomic).
  - id: DEC-3
    summary: >
      Fix F-3 with a PyYAML SafeLoader subclass overriding the mapping constructor
      (_NoDuplicateKeySafeLoader), rather than a post-parse manual duplicate-key scan of
      the raw text.
    rationale: >
      Overriding the constructor is correct at every nesting level automatically (it is
      YAML's own recursive mapping-construction mechanism), whereas a text-level scan
      would need to reimplement YAML's own key/scalar resolution to know which lines are
      even keys, and could not correctly identify nested duplicate keys.
  - id: DEC-4
    summary: >
      Fix F-4 by giving every physical file its own LegacyArtifactRecord (new
      agent-run-patch/prompt-markdown kinds) and adding entry_type to
      LegacyArtifactRecord/BackupPlanEntry/RecoveryStep, rather than adding a separate
      "companions" list alongside the existing folded-primary design.
    rationale: >
      A single, uniform list of one-record-per-physical-file is simpler to reason about
      and test (F-4's own instruction to "compare source physical members against backup
      entries exactly" is trivial against a flat list, awkward against a
      primary-plus-nested-companions shape) and naturally satisfies "every physical
      legacy member must be represented in the manifest and backup plan."
  - id: DEC-5
    summary: >
      Fix F-5 with a model_validator(mode="after") recompute-and-verify check on each of
      the three models, plus rewriting every builder to compute the real digest from a
      plain dict before constructing the model exactly once (removing the
      placeholder-digest + model_copy pattern entirely), and having apply_migration force
      a full model_validate round trip on its three arguments.
    rationale: >
      model_validator(mode="after") is the only hook that runs on every construction path
      including model_validate/schema-registry dispatch (matching the precedent set by
      ContractEnvelopeV2's own Finding-C guard in ORCH-002); model_copy never re-validates,
      so any placeholder-then-model_copy pattern can never be protected by such a
      validator, which is exactly why the finding demands builders "calculate the final
      digest before constructing the final validated model." Forcing model_validate in
      apply_migration (rather than trusting whatever object the caller passed) closes the
      gap where a `model_construct`-built or in-place-mutated object could otherwise slip
      through a naive digest-string comparison.
  - id: DEC-6
    summary: >
      Fix F-6 by validating an entire task's event history as one group
      (_classify_workflow_history_group), including a post-read re-listing of the
      directory to catch a TOCTOU mutation (F-7), rather than validating each state/*.json
      file independently and only cross-checking parent-digest afterward.
    rationale: >
      The real workflow.event_store.load_history function already treats a task's history
      as one indivisible unit (any single corrupt/inconsistent member invalidates the
      whole replay); classifying files independently first and only later noticing a chain
      break would still let an individually-well-formed file be reported KNOWN in the
      interim, which is exactly the "do not classify independently valid-looking members
      as a trusted history" defect the finding names.
  - id: DEC-7
    summary: >
      Fix F-7's "apply must refuse before inspecting the source tree" by moving the
      dry_run check to the very first statement of cli.py's migrate_apply_command's
      build() closure, before calling inspect_source -- and separately disabling Click's
      own implicit Path(readable=True) check on --source (a second, independently
      discovered instance of the same underlying gap class), rather than trying to make
      inspect_source itself "dry-run aware."
    rationale: >
      inspect_source has no reason to know about dry-run semantics -- it is a pure,
      read-only classifier used by inspect/plan/apply alike. Keeping the refusal purely at
      the CLI-command level (and, for apply_migration itself, at the very top of the
      function) keeps the "refuse before any access" property simple to state and to test
      (no source access of any kind occurs before the check), rather than threading a
      dry_run flag through the reader.

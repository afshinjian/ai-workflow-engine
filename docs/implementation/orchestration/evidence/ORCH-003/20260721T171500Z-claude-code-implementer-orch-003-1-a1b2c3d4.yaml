decisions:
  - id: DEC-1
    summary: >
      A legacy-artifact source root mirrors the union of this engine's existing
      on-disk stores: state/, agent-runs/, prompts/ (exactly
      prompt/store.py, agents/artifacts.py, and workflow/event_store.py's own
      `_artifact_root()` layout under ~/.ai-workflow-engine/workflow-runs), plus
      a new approvals/ convention for archived git/approval.py YAML files.
      `--source` defaults to that real root (overridable).
    rationale: >
      This grounds the framework in artifacts this codebase actually produces
      today, needs no new configuration surface for production use, and lets
      every "known legacy artifact" test reuse the real, already-reviewed
      writer functions rather than hand-crafting byte-identical fixtures.
  - id: DEC-2
    summary: >
      Classification never guesses: family is determined solely by fixed
      directory position, then strict validation against the exact existing v1
      model for that family -- never content sniffing or trying multiple
      families until one parses.
    rationale: >
      Matches architecture-v3.md's explicit "never guess missing or ambiguous
      legacy semantics" requirement and this stage's "no guessed legacy
      semantics" independent-review checklist item. An unlabelled/foreign
      approval `kind` is quarantined UNKNOWN_APPROVAL_KIND rather than inferred
      from shape.
  - id: DEC-3
    summary: >
      14 stable, specific QuarantineReason values instead of one generic
      "invalid" bucket; a .patch/.md companion mismatch/absence downgrades the
      primary .json record to QUARANTINED rather than being listed separately.
    rationale: >
      A caller (or a later stage's decision policy) needs to distinguish a
      symlink-safety refusal from a corrupt artifact from a schema-version
      mismatch (the mixed-version case). Companion-folding mirrors exactly what
      the real agents/artifacts.py/prompt/store.py loaders already verify at
      load time -- an incomplete pair is one defective artifact, not two.
  - id: DEC-4
    summary: >
      manifest_digest/plan_digest are self-referential SHA-256 content hashes
      (the record's own canonical JSON with the digest field excluded), the
      same technique as agents/artifacts.py's run_id. No model in this package
      carries a timestamp field.
    rationale: >
      Guarantees byte-for-byte determinism across repeated inspection/planning
      of unchanged input and independent recomputability by a reviewer, per
      architecture-v3.md's "Audit timestamps are excluded from identity" rule
      and this stage's "deterministic migration inspection and planning
      results" requirement.
  - id: DEC-5
    summary: >
      ApplyResult.dry_run is typed Literal[True]; apply_migration raises
      ApplyNotAuthorizedError as the first thing it does whenever dry_run is not
      True, before touching its other arguments.
    rationale: >
      Makes "real apply is disabled" a structural, type-level guarantee rather
      than merely a tested runtime behavior -- there is no code path that can
      construct an ApplyResult representing a real apply.
  - id: DEC-6
    summary: >
      CLI `migrate inspect|plan|apply` reuse the exact ORCH-002 contract
      machinery unchanged (_protected, _contract_v2_success/_contract_v2_error,
      canonical_json for v1) rather than any new error-handling path.
    rationale: >
      v1/v2 behavior, single-JSON-document stdout purity under FORCE_COLOR, and
      "apply without --dry-run refuses via a stable error before any command
      body other than the refusal check runs" all fall out of already-reviewed
      infrastructure, minimizing new surface area in a CLI-contract-critical file.
  - id: DEC-7
    summary: >
      A nonexistent (never-created) default `--source` root is treated as an
      empty manifest, not an error; a path that exists but is not a directory
      still fails closed with MigrationSourceError.
    rationale: >
      A fresh machine that has never produced a legacy artifact is a legitimate
      empty state (this stage's own "empty input" test requirement), not a
      corruption signal -- unlike a source path that exists but is the wrong
      type, which remains a hard, fail-closed error.
  - id: DEC-8
    summary: >
      Hand-edit implementation-state.yaml's ORCH-003 entry, history (sequences
      40-42), and last_updated, rather than invoking a transition subcommand
      four times against the real governance file, re-parsing with
      `yaml.safe_load` after every edit to independently confirm validity
      before running the official validator.
    rationale: >
      Same rationale as every prior ORCH-000/ORCH-001/ORCH-002 session:
      write_state_atomic's yaml.safe_dump would reformat the entire flow-style
      document into block style, an out-of-scope stylistic change.
    self_correction_note: >-
      A first attempt at this edit accidentally left an orphaned second key
      (_superseded_reason_from_review_orch_002) inside the last_updated mapping
      while replacing its `reason` value, which would have violated the
      schema's `additionalProperties: false` on that object. This was caught by
      this session's own re-parse-and-inspect-keys discipline
      (`yaml.safe_load(...); sorted(d['last_updated'].keys())`) before running
      the official validator, and the orphaned block was deleted in the same
      pass. Recorded here rather than silently corrected and omitted, per
      session-protocol.md's fail-closed spirit: evidence states what actually
      happened, not an idealized version of it.
  - id: DEC-9
    summary: >
      An early test-authoring mistake used the real, $HOME-coupled
      `workflow.event_store.append` against an explicit non-$HOME
      `--source`/`tmp_path` fixture directory, which actually wrote one
      artifact under this machine's real ~/.ai-workflow-engine/workflow-runs
      during the first full test run.
    rationale: >
      Caught immediately via `find ~/.ai-workflow-engine/workflow-runs -newer
      pyproject.toml`, confirmed by file birth-time (2026-07-21 20:33, during
      this session) and by project/task IDs `p`/`t` (which appear only in these
      fixtures) to be exactly this session's own write, distinct from an older,
      pre-existing `test-project` directory (birth-time 19:21, before this
      session, left untouched). The exact polluted subtree
      (~/.ai-workflow-engine/workflow-runs/state/p/, and only that subtree) was
      removed with `rm -rf`, and both affected fixtures
      (tests/test_migration_plan_apply.py, tests/test_migration_cli.py) were
      rewritten to write canonical JSON bytes directly into the explicit
      disposable root via `prompt.renderer.canonical_json`, never through a
      real $HOME-coupled writer. tests/test_migration_readers.py intentionally
      still exercises the real writers for its "known legacy artifact"
      coverage, but only under a `legacy_home` fixture that monkeypatches $HOME
      first. No real governance file (this repository's tracked Git content)
      was ever at risk; the affected path is a legacy-artifact-store
      convenience directory outside Git, not tracked by any commit.

decisions:
  - id: DEC-1
    summary: >
      Fix F-8 by determining an entry's type solely from a no-follow lstat
      (os.DirEntry.stat(follow_symlinks=False) / os.lstat), never an open(), and by
      changing _iter_entries_safe's yield contract from a symlink-only boolean to a
      three-way kind string ("file"/"symlink"/"unsupported").
    rationale: >
      A FIFO opened with plain os.open(O_RDONLY) blocks until a writer connects; a
      socket requires a connect(), not an open(); both would hang or misbehave this
      read-only scanner. lstat never touches the entry's "content" at all, so it is the
      only operation that can safely classify an arbitrary node type. The three-way kind
      string (rather than adding a second boolean) keeps the call site a single
      exhaustive if/elif/else instead of two independent flags that could combine into an
      invalid state.
  - id: DEC-2
    summary: >
      Treat entry_type "unsupported" identically to "unreadable" everywhere backup/
      recovery completeness is computed (excluded from BackupPlan.entries, added to
      incomplete_paths, complete=False), rather than inventing a separate completeness
      dimension.
    rationale: >
      Both states mean exactly the same thing from the backup plan's perspective: "no
      genuine bytes were ever obtained for this entry." Reusing the existing
      completeness machinery (already reviewed and tested in the F-4 remediation) is
      simpler and lower-risk than a parallel mechanism.
  - id: DEC-3
    summary: >
      Fix F-9 with a single shared _verify_unchanged(path, expected) helper, called once
      per member at the very end of each family's happy path (immediately before
      returning KNOWN records), rather than wrapping every individual _read_or_none call
      site in a read-verify-read pattern.
    rationale: >
      Placing the check at the end covers the *entire* validation window for that
      member -- parsing, schema validation, cross-checks, and (for prompts) the
      expensive deterministic re-render -- with one final comparison, rather than only
      the narrower window between two back-to-back reads at the start. It also keeps the
      digest/model used for a KNOWN record anchored to the very first read's bytes,
      which is what makes the fix provably non-disruptive to the stable case.
  - id: DEC-4
    summary: >
      Add F-9's workflow-history content-verification as a second, separate phase after
      the pre-existing F-7 directory-listing-based phase, rather than merging the two
      checks into one loop.
    rationale: >
      They detect genuinely different things (a changed *name set* vs. changed *bytes at
      an unchanged name*); keeping them as two distinct, sequential checks, each
      independently testable and each with its own clear failure message, is clearer
      than one combined check that would need to explain which kind of inconsistency it
      found.
  - id: DEC-5
    summary: >
      Test F-9 with a deterministic, non-threaded fault-injection helper
      (_inject_mutation_after_first_read) that monkeypatches the shared _read_or_none
      module attribute to mutate the real file on disk immediately after its first
      successful read for a specific target path, rather than using real concurrent
      threads/processes to race a writer against the scanner.
    rationale: >
      A monkeypatched call-counted primitive is exactly deterministic (no timing
      dependence, no flakiness) while still exercising the *actual* code path every
      family uses for both its initial and its verification reads -- it proves the real
      invariant (a second read genuinely returns different bytes and the classifier
      genuinely reacts to that), not merely that some helper function was invoked.
  - id: DEC-6
    summary: >
      Test F-8's FIFO/socket cases on a daemon thread with an explicit timeout, rather
      than trusting that "we don't call open()" is sufficient without an executable
      proof.
    rationale: >
      A daemon thread guarantees the test process can still exit even if a future
      regression reintroduces a blocking open(); the timeout converts what would
      otherwise be an indefinite hang into a clear, immediate assertion failure --
      matching the finding's own requirement that this be proven, not merely asserted.

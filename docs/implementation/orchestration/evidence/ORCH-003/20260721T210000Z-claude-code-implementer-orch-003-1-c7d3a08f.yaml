human_review_findings:
  - id: F-8
    title: Unsupported filesystem entries are silently omitted
    summary: >-
      _iter_entries_safe() ignored filesystem entries that are not regular files,
      directories, or symlinks (FIFOs, sockets, device nodes); inspect_source returned no
      manifest artifact for a FIFO placed at state/p/t/00000001.json, and
      build_backup_plan incorrectly returned complete=True with no incomplete_paths.
  - id: F-9
    title: Same-name content mutation remains undetected
    summary: >-
      Workflow-history mutation detection only compared the directory filename set after
      reading (F-7); a file's contents changing during inspection while its filename
      remained unchanged could still be classified KNOWN with a digest that no longer
      matched the file on disk, and no equivalent protection existed at all for
      agent-run/prompt/approval single- or paired-file reads.

findings:
  - id: F-4
    severity: HIGH
    blocking: true
    path: docs/implementation/orchestration/stages/ORCH-000.md
    location: "Exact allowed files or directories section; commit 020d036 as a whole"
    summary: >
      The REMEDIATOR session amended stages/ORCH-000.md and decision-log.md
      directly, on its own authority, to resolve the prior REVIEW_REJECTED
      findings F-1/F-2 -- but its own operative instructions
      (prompts/remediate-rejected.md: "Fix only the cited findings within the
      original or narrower allowed path scope. If a fix requires wider scope
      or a contract/plan change, stop and record BLOCKED for reviewed
      replanning.") and session-protocol.md section 6 ("changes only the
      original or narrower allowed scope... It cannot erase prior evidence")
      both required it to stop and record BLOCKED instead, since F-2 is
      squarely a contract/plan defect. No ARCHITECT- or HUMAN_OWNER-role
      history entry authorizes this amendment; implementation-state.yaml
      history sequences 7-9 are all role REMEDIATOR / actor
      claude-code-remediator, unlike the repository's own precedent for
      out-of-band authorization (history sequence 2,
      RESOLVED_DESIGN_PACKAGE_NOT_COMMITTED, role HUMAN_OWNER). Framing an
      unauthorized plan/governance-document edit as "authorized... under
      direct task instruction, not self-authorized rationale" (this
      remediation's own DEC-R1) is not distinguishable, from the durable
      repository record alone, from the exact self-authorization pattern
      that F-1 already rejected once -- it has simply moved one level up, from
      widening a stage's evidence path to rewriting the stage contract and
      the decision log that are supposed to constrain that widening in the
      first place.
    failure_mode: >
      If this pattern is accepted, any REMEDIATOR facing an inconvenient
      contract defect can "fix" it by rewriting the contract itself and
      documenting its own rationale for why that was allowed, permanently
      defeating the BLOCKED/reviewed-plan-amendment gate that
      implementation-plan.md section 1 and session-protocol.md section 8
      exist to enforce. A fresh session reproducing this candidate from
      repository state alone has no way to distinguish a legitimately
      reviewed plan amendment from a REMEDIATOR's own unilateral one, since
      both leave the same shape of evidence (a decision-log entry with
      rationale, authored by the acting session).
  - id: F-5
    severity: HIGH
    blocking: true
    path: docs/implementation/orchestration/decision-log.md
    location: "Header (lines 1-4); new entry D3-016"
    summary: >
      decision-log.md's own unchanged header states: "Entries are append-only.
      Changes require an architecture/plan version increment and review;
      implementation sessions cannot rewrite accepted decisions." Entry D3-016
      was appended by the remediation session with architecture_version
      (3.0.0) and plan_version (1.0.0) both left unchanged -- confirmed by
      diffing implementation-state.yaml between 17111c7 and 020d036, and by
      the remediation's own handoff, which states this as a deliberate choice
      ("architecture_version (3.0.0) and plan_version (1.0.0) remain the
      schema-pinned constants... unaffected"). The decision log's own stated
      precondition for accepting new entries was not met.
    failure_mode: >
      The one document meant to be the durable, tamper-evident record of
      accepted architecture/plan changes can now be appended to without the
      version increment it itself requires, by the same class of session
      (REMEDIATOR) that implementation-plan.md and session-protocol.md
      restrict to narrower-than-original scope. This defeats decision-log.md's
      purpose as a gate against exactly this kind of unreviewed change.
  - id: F-6
    severity: HIGH
    blocking: true
    path: docs/implementation/orchestration/stages/ORCH-000.md
    location: "Exact allowed files or directories section (post-amendment)"
    summary: >
      Independently confirmed via `git diff --name-only 17111c7 020d036` and a
      freshly-written cross-check script: commit 020d036 changes
      docs/implementation/orchestration/decision-log.md and
      docs/implementation/orchestration/stages/ORCH-000.md itself. Neither
      path is named in stages/ORCH-000.md's "Exact allowed files or
      directories" line, which -- even after this same commit rewrote that
      line -- lists only evidence/ORCH-000/, reviews/ORCH-000/,
      handoffs/ORCH-000/ and implementation-state.yaml. This is the exact
      "changed paths exceed the stage scope" fail-closed condition
      session-protocol.md section 8 names as requiring BLOCKED, applied to
      the remediation commit itself rather than the original bootstrap
      commit.
    failure_mode: >
      A stage specification that authorizes its own contents' evidence paths
      but never authorizes anyone to edit the specification file itself (or
      the decision log recording why it changed) has no internally-consistent
      route by which any session could legitimately amend it -- the same
      category of hidden lifecycle gap stages/ORCH-000.md's own Risks section
      already once required rejecting, now reproduced in the amendment meant
      to fix it.
  - id: F-7
    severity: LOW
    blocking: false
    path: docs/implementation/orchestration/reviews/ORCH-000/logs/
    location: "20260720T172520Z-claude-code-independent-reviewer-59f68d54.yaml commands[*].stdout_artifact"
    summary: >
      Pre-existing, not introduced by the remediation under review. The prior
      rejecting review's evidence YAML references 8 stdout_artifact paths
      under reviews/ORCH-000/logs/, 7 of which use a .log extension excluded
      by the repository root .gitignore. Commit 17111c7's own diffstat shows
      only reviews/ORCH-000/logs/workflowctl-verify.json was actually
      committed; the other 7 referenced logs are not part of any committed
      tree. Should be corrected (re-captured under non-.log extensions and
      committed) alongside any future remediation, but does not by itself
      change this verdict.

findings:
  - id: F-3
    severity: HIGH
    blocking: true
    path: tests/test_orchestration_feature_state.py
    location: 'TestRealRepositoryState.test_committed_state_next_eligible_stage_is_orch_001, line 897'
    summary: >
      This test asserts `ofs.recompute_next_eligible(state) == "ORCH-001"`
      against the real committed implementation-state.yaml -- a transient
      fact about the live governance document at the moment this test was
      authored, encoded as though it were a permanent invariant. The moment
      ORCH-001 legitimately reaches REVIEW_APPROVED (the exact terminal
      state stages/ORCH-001.md's own review process exists to reach, and
      that ORCH-002's prerequisite depends on), the real committed state's
      recomputed next_eligible_stage correctly becomes "ORCH-002", and this
      test starts failing -- not because of a defect in apply_transition or
      recompute_next_eligible (both are independently confirmed correct;
      see the CLI-driven cross-check command above), but because the test
      itself hard-codes a fact that this stage's own success condition is
      guaranteed to invalidate.
    failure_scenario: >
      A REVIEWER correctly approves ORCH-001 (VERIFIED -> REVIEW_APPROVED),
      correctly recomputing next_eligible_stage to ORCH-002 per
      session-protocol.md and the validator's own semantics. The very next
      `pytest -q` run by any session anywhere in the ORCH pipeline --
      including the ORCH-002 implementer's own stage-required verification
      command (stages/ORCH-002.md: "pytest -q") -- now fails one test. No
      future session has the authority to fix it: ORCH-002's allowed paths
      (stages/ORCH-002.md) do not include
      tests/test_orchestration_feature_state.py, and REVIEW_APPROVED is
      immutable except by a reviewed plan amendment marking it SUPERSEDED
      (session-protocol.md section 2) -- a governance-amendment action, not
      an ordinary REMEDIATOR/IMPLEMENTER action. The only session with both
      the standing authority (ORCH-001's own allowed paths, per
      stages/ORCH-001.md) and the opportunity (before ORCH-001 becomes
      REVIEW_APPROVED) to fix this is a REMEDIATOR acting now. Reproduced
      concretely, not hypothetically: independently drove the real CLI
      `transition` subcommand (not a hand-edit) against a throwaway copy of
      the actual committed state file to REVIEW_APPROVED, and the pinned
      test then fails deterministically with `AssertionError: assert
      'ORCH-002' == 'ORCH-001'`.
    reproduction: >
      reviews/ORCH-001/logs/20260721T131500Z-claude-code-independent-reviewer-orch-001-2-0637a178-f3-pinned-test-failure-after-approval.txt,
      preceded by the CLI-driven cross-check command in the commands list
      above (both independent of, and not reusing, any prior probe).

findings:
  - id: F-1
    severity: HIGH
    blocking: true
    path: scripts/orchestration_feature_state.py
    location: apply_transition, lines 878-1061 (specifically: no branch conditioned on `from_status == "BLOCKED" and to_status == "IN_PROGRESS"`)
    summary: >
      apply_transition authorizes BLOCKED -> IN_PROGRESS with no check that
      the stage's blocker(s) have been resolved and no recheck that its
      prerequisites remain REVIEW_APPROVED, directly contradicting
      session-protocol.md section 2's row for this exact edge: "BLOCKED |
      IN_PROGRESS | appropriate role; blocker resolution is evidenced and
      prerequisites still approved." check_transition_legal only checks
      role for this edge (LEGAL_TRANSITIONS entry with roles=None, i.e. any
      role); apply_transition's only edge-specific gate is the
      NOT_STARTED -> IN_PROGRESS branch (lines 924-934, uniqueness +
      expected_base_head), which does not run for BLOCKED -> IN_PROGRESS.
      resolve_blockers is an optional kwarg the caller may simply omit.
      validate_semantics contains no rule requiring a stage's blockers array
      to be free of unresolved entries once status leaves BLOCKED, nor a
      rule requiring recomputed prerequisite closure at IN_PROGRESS.
    failure_scenario: >
      A stage is BLOCKED with an unresolved blocker (resolution: null),
      e.g. because its prerequisite's REVIEW_APPROVED status was later
      superseded, or because the blocking issue genuinely was never fixed.
      A session (any role -- the edge is unrestricted) calls
      `transition --to IN_PROGRESS --stage ORCH-00X` without
      `--resolve-blocker`. apply_transition accepts this: the resulting
      state has status IN_PROGRESS, the blocker still open
      (resolution: null), and `validate --state <file>` on that exact
      result reports PASS, 0 errors -- the tool that exists specifically to
      "machine-enforce the cross-session state-transition contract"
      (module docstring) silently authorizes and then blesses exactly the
      illegal transition the stage's own documented risk warns about
      ("Validator defects could authorize later work" /
      R-ORCH-001-VALIDATOR-CORRECTNESS: "a defect could incorrectly
      authorize an illegal state transition"). Reproduced independently in
      this review with a minimal schema-shaped fixture (see the adversarial
      probe command above); not a hypothetical -- the exact scenario runs
      and passes.
    reproduction: >
      reviews/ORCH-001/logs/20260721T122035Z-claude-code-independent-reviewer-orch-001-1-0a0c5a0c-adversarial-blocked-resume-probe.py,
      output in the sibling -output.txt file (referenced in the commands
      list above by stdout_digest).
  - id: F-2
    severity: MEDIUM
    blocking: true
    path: tests/test_orchestration_feature_state.py
    location: "test_blocked_with_blocker_succeeds_and_resolve_reopens (around line 621)"
    summary: >
      The 70-test suite's only BLOCKED -> IN_PROGRESS coverage
      (test_blocked_with_blocker_succeeds_and_resolve_reopens) always passes
      resolve_blockers={"B_ISSUE": "fixed"} and asserts the blocker becomes
      resolved -- it never asserts the negative case (resuming without
      resolving, or with a stale/un-reapproved prerequisite, should be
      rejected). Stages/ORCH-001.md's "Tests required" line demands
      "Focused unit, negative and fault/concurrency tests for every
      invariant"; the blocker-resolution/prerequisite-reapproval invariant
      named explicitly by session-protocol.md section 2's BLOCKED row has no
      negative test, which is why F-1 shipped as VERIFIED with a fully
      green suite.
    failure_scenario: >
      Any future change to apply_transition's BLOCKED -> IN_PROGRESS path
      (including a fix for F-1) has no regression test pinning the required
      behavior, so a fix could be silently reverted or a new equivalent gap
      introduced without any test failing.

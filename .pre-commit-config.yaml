repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.3
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 25.1.0
    hooks:
      - id: black
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.1
    hooks:
      - id: mypy
        args: [src]
        pass_filenames: false
        additional_dependencies:
          - pydantic>=2.7
          - PyYAML>=6.0
          - rich>=13.7
          - typer>=0.12
          - types-PyYAML
